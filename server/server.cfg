# NFSMW Online server config.
#
# Local testing:
#   keep public endpoints at 127.0.0.1.
#
# Remote hosting:
#   change *_ENDPOINT hosts to your public IP/hostname.
#   keep *_LISTEN hosts on 0.0.0.0 unless you need one specific interface.

# Race relay: local socket first, then the public endpoint sent to clients.
# Keep RACE_LISTEN, RACE_ENDPOINT, and client/online/configs/ONLINE.cfg
# race_port on the same UDP port.
RACE_LISTEN=0.0.0.0:2000
RACE_ENDPOINT=127.0.0.1:2000

# Original game peer UDP port used inside relayed packets. This is not the
# server relay port, but UDP 3658 must be free on every client machine.
UDP_GAME_PORT=3658

# Main TCP services: MW LAN joins rooms on TCP 9900. The extra 30920 listener
# is used by the online/bootstrap path and should match the client
# bootstrap_port/default online port.
BOOTSTRAP_LISTEN=0.0.0.0:20921
BOOTSTRAP_ENDPOINT=127.0.0.1:20921
LOBBY_LISTEN=0.0.0.0:9900
LOBBY_ENDPOINT=127.0.0.1:30920
LOBBY_EXTRA_LISTEN_PORTS=30920
CONTROL_LISTEN=0.0.0.0:20923
CONTROL_ENDPOINT=127.0.0.1:20923
CONTROL_ALIAS_LISTEN=0.0.0.0:13505
CONTROL_ALIAS_ENDPOINT=127.0.0.1:13505

# Server capacity and basic abuse protection.
SERVER_MAX_PLAYERS=10
# Active pre-login lobby/bootstrap sockets. Prevents slow clients from using
# one thread each forever before they count as players.
SERVER_MAX_CONNECTIONS=64
SERVER_CONN_RATE_LIMIT=20
SERVER_CONN_RATE_WINDOW=10
SERVER_CONN_RATE_BLOCK=5
SERVER_TCP_TIMEOUT=20
# Drops clients that keep incomplete lobby frames/lines buffered above this.
SERVER_MAX_BUFFER_BYTES=131072
ROOMS=32
ROOMMAX=64
GAMES=128
GAMETIMEOUT=3600
GAME_EXPIRE_TIME=300
QUICKMATCH_TIMEOUT=30

# Race/LAN compatibility.
# INCLUDE_RELAY_FIELDS adds relay host/port fields in lobby packets for clients
# that understand them.
INCLUDE_RELAY_FIELDS=1
LOBBY_GSTA_LEGACY_FLOW=0
LOBBY_CLAMP_MIN_PLAYERS_TO_COUNT=1

# auto gives same-PC/LAN peers virtual addresses when needed; off disables it.
# Same-PC tests that connect through the machine LAN IP otherwise advertise two
# room participants with the same non-loopback ADDR/LADDR and MW may half-join.
RACE_VIRTUAL_PEER_MODE=off
RACE_VIRTUAL_PEER_SUBNET=100.64.0.0/24

# Extra UDP relay listen ports used only when multiple active lobby users come
# from the same peer IP. The first same-PC player keeps RACE_LISTEN's port.
SAME_PC_RLYPORTS=2000,2001,2002,2003

# Keep loopback peers on the stock same-PC room shape. The MW room captures that
# fully enter the lobby advertise both local players as 127.0.0.1; aliasing the
# guest to 127.0.0.2 can leave the room in a half-connected state.
RACE_LOOPBACK_ALIAS_PEERS=0

# Seconds to keep disconnected racers reserved while the game reconnects or
# returns from an active race.
RACE_DETACHED_GRACE=8.0
RACE_DETACHED_ACTIVE_GRACE=30.0

# UDP relay tuning. Keep these on defaults unless race entry breaks.
UDP_RELAY_PRUNE_ROOM_ENDPOINTS=1
UDP_RELAY_ACK_CMD5_UNRAW=1
UDP_RELAY_SPOOF_PEER_WINDOW=6.0
UDP_RELAY_RESET_ON_GAME_START=0
# Caps relay state created by UDP sources and pending room probes.
UDP_RELAY_MAX_CLIENTS=128
UDP_RELAY_MAX_PENDING_ROOMS=128
UDP_RELAY_PENDING_ROOM_TTL=60.0
UDP_LOCAL_PORT=40001
UDP_LOCAL_PORT_SPAN=8
UDP_SAME_HOST_RAW_ECHO_LIMIT=0

# Lobby behavior.
# Stock behavior: gsea applies CUSTFLAGS/CUSTMASK filters for race mode,
# car/performance class, and related room options. Set to 0 to list all public
# games regardless of those filters.
LOBBY_GSEA_CUST_FILTERS=1
LOBBY_DETACH_ON_PEER_CLOSE=1
LOBBY_DETACHED_GRACE=20.0
LOBBY_REATTACH_OPEN_GAMES=0
LOBBY_INVITE_PENDING_SECONDS=90.0
LOBBY_GSET_DEDUPE_WINDOW=0.20
LOBBY_JOIN_MGM_DELAY=0.015
LOBBY_JOIN_NOTIFY_MGM=1
LOBBY_GJOI_FORCE_READY=0
LOBBY_JOIN_COUNTDOWN_ENABLE=0
LOBBY_JOIN_COUNTDOWN_DELAY=10.7
LOBBY_READY_NOTIFY_PEERS=1
LOBBY_ROOM_OPFLAGS_FROM_READY=0
LOBBY_READY_COUNTDOWN_ENABLE=0
LOBBY_READY_COUNTDOWN_DELAY=3.0
LOBBY_TERM_SST_DELAY=2.7

# Lobby news/TOS push. captured uses built-in/captured payloads; file/http
# modes are only useful when those backends are configured.
LOBBY_NEWS_MODE=captured
LOBBY_NEWS_HOST=
LOBBY_NEWS_BUDDY_PORT=0
LOBBY_NEWS_HTTP_PORT=0
LOBBY_TOS_FILE=tos
LOBBY_NEWS_FILE=news
LOBBY_PRELOGIN_BURST_AFTER_NEWS=1
LOBBY_NEWS_PUSH_AFTER_AUTH=0
LOBBY_NEWS_PUSH_DELAY=0.75
LOBBY_NEWS_AUTOPUSH_AUTH=0

# Account validation.
# 0 = LAN/no account verification.
# 1 = Online/account verification.
AUTH_VERIFY=0
AUTH_MODE=password
AUTH_ALLOW_CREATE=1
AUTH_ACCOUNTS_FILE=data/auth_accounts.json
AUTH_SECURE_STORE=1
AUTH_MIGRATE_PLAINTEXT=1
AUTH_FAIL_LIMIT=5
AUTH_FAIL_WINDOW=60
AUTH_LOCKOUT_SECONDS=120
AUTH_REQUIRED_FIELDS=
AUTH_REQUIRE_TOS=0
AUTH_TOS=1
AUTH_REQUIRE_SHARE=0
AUTH_FORCE_REJECT_TTL=300
AUTH_REJECT_REPEAT=4
AUTH_REJECT_INTERVAL=0.25
AUTH_REJECT_CLOSE_DELAY=1.10
AUTH_EXTRA_PERSONAS=
AUTH_AUTOPUSH=0

# Captures raw auth attempts for debugging/migration. Leave disabled normally.
AUTH_CAPTURE=0
AUTH_CAPTURE_FILE=data/auth_captures.jsonl
AUTH_AUTO_ENROLL=0

# Legacy password masks accepted during auth migration.
AUTH_LEGACY_MASKS=ed5faa76adec3f22520b6c90ec35acd4,1773180069,759374d7097b0ea0

# Persona rules.
PERSONA_UNIQUE=1
PERSONA_MAX_PERSONAS=0
PERSONA_RESERVED_NAMES=
PERSONA_FORBIDDEN_WORDS=
PERSONA_BLACKLIST_FILE=data/persona_blacklist.txt

# Client rejection codes for blocked persona names. Empty stage-specific values
# fall back to PERSONA_BLACKLIST_CODE.
PERSONA_BLACKLIST_CODE=invp
PERSONA_BLACKLIST_CPER_CODE=
PERSONA_BLACKLIST_PERS_CODE=pset

# Social/control data.
CONTROL_SOCIAL_ENABLE=1
CONTROL_SOCIAL_ALL_ONLINE_ENABLE=1
CONTROL_SOCIAL_FILE=data/social_relations.json
# Keep this on for Internet-facing servers: control/social identity must match
# a recent lobby profile or active lobby user from the same peer IP.
CONTROL_REQUIRE_LOBBY_SESSION=1
# 0 rejects arbitrary persona names sent by the control client.
CONTROL_TRUST_CLIENT_PERSONA=0
CONTROL_PROFILE_TTL=90.0
CONTROL_MAX_CONNECTIONS=32
CONTROL_PREAUTH_TIMEOUT=20.0
CONTROL_IDLE_TIMEOUT=120.0
CONTROL_HTTP_MAX_BODY=8192
CONTROL_MAX_FRAME_BYTES=65535
CONTROL_RNOT_ENABLE=1
CONTROL_RNOT_SELF_ENABLE=0
CONTROL_GENERIC_ACK_ENABLE=1
ADMIN_BANS_FILE=data/admin_bans.json

# Ranking, stats, and reports.
RANK_FILE=data/rankings.dat
STATS_FILE=data/stats.dat
GAME_REPORTS_FILE=data/game_reports.dat
RANKLIM=10000
STATLIM=10000
GAMELIM=1000
RANK_AUTHENT=1
RANK_EVALUATE_GAME=1
RANK_OUTPUT_RAW=0
RANK_MINIMUM_TIME=60
RANK_REPORT_TIME=300
RANK_SAVE_TIME=600
SERVER_STAT_REFRESH=60

# Debug/logging.
# DEBUG_MODE is general server debug. It writes DEBUG logs to LOG_FILE without
# changing the console level. It is separate from UDP/race debug below.
DEBUG_MODE=1
LOG_LEVEL=INFO

# Keep the terminal quiet so admin commands are easier to type.
# Full normal logs are still saved to LOG_FILE.
# To disable all logging, set LOG_CONSOLE_LEVEL=OFF and leave LOG_FILE empty.
LOG_CONSOLE_LEVEL=INFO
LOG_FILE=
LOG_FILE_LEVEL=

# Very verbose lobby packet traces. Turn on only while diagnosing lobby flow.
LOBBY_FRAME_TRACE=1

# UDP/race-only debug.
UDP_RELAY_VERBOSE=1
UDP_DEBUG=on
